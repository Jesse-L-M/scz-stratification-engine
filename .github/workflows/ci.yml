name: ci

on:
  pull_request:
  push:

jobs:
  docs-bootstrap:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install ".[test]"
      - run: pytest tests/test_docs_presence.py
